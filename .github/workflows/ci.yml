name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pester:
    name: Pester (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Pester 5
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $latestPester = Get-Module -Name Pester -ListAvailable | Sort-Object Version -Descending | Select-Object -First 1
          if ($null -eq $latestPester -or $latestPester.Version -lt [Version]'5.0.0') {
            Install-Module -Name Pester -Scope CurrentUser -Force -SkipPublisherCheck -MinimumVersion 5.0.0
          }

      - name: Run Pester tests
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $result = Invoke-Pester -Path ./tests -CI -PassThru
          if ($result.FailedCount -gt 0) {
            throw "Pester reported $($result.FailedCount) failed test(s)."
          }

      - name: Validate import in Windows PowerShell 5.1
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force

          Import-Module "$PWD\OpsToutatis.psd1" -Force -ErrorAction Stop
          Remove-Module -Name OpsToutatis -ErrorAction SilentlyContinue
